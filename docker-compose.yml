
services:
  app:
#    platform: linux/arm64
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY env var is required. See .env.example}
    ports:
      - "8000:8000"
    # --reload is intentional for development (hot-reload on file save).
    # Remove it for production deployment.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15.5-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  client:
#    platform: linux/arm64
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app
    working_dir: /app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://app:8000

volumes:
  db_data:
