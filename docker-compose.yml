
# ── Variable groups ────────────────────────────────────────────────────────────
x-env-db: &env-db
  POSTGRES_USER: postgres
  POSTGRES_DB: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

x-env-app: &env-app
  DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY env var is required. See .env.example}
  RECEIPT_QR: ${RECEIPT_QR:-}
  RECEIPT_QR_TITLE: ${RECEIPT_QR_TITLE:-}

x-env-client: &env-client
  VITE_CURRENCY: ${VITE_CURRENCY:-RUB}

# ── Services ───────────────────────────────────────────────────────────────────
services:
  app:
#    platform: linux/arm64
    build:
      context: ./app
      dockerfile: Dockerfile
    volumes:
      - ./app:/app
    working_dir: /app
    environment:
      <<: *env-app
    ports:
      - "8000:8000"
    # --reload is intentional for development (hot-reload on file save).
    # Remove it for production deployment.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15.5-alpine
    environment:
      <<: *env-db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  client:
#    platform: linux/arm64
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
    working_dir: /app
    environment:
      <<: *env-client
    ports:
      - "8501:5173"
    depends_on:
      - app

volumes:
  db_data:
